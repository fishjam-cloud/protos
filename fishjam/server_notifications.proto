syntax = "proto3";

package fishjam;

import "fishjam/notifications/shared.proto";

// Defines any type of message passed between FJ and server peer
message ServerMessage {
  // Notification sent when a room crashes
  message RoomCrashed {
    string room_id = 1;
  }

  enum PeerType {
    PEER_TYPE_UNSPECIFIED = 0;
    PEER_TYPE_WEBRTC = 1;
    PEER_TYPE_AGENT = 2;
    PEER_TYPE_VAPI = 3;
  }

  // Notification sent when a peer is added
  message PeerAdded {
    string room_id = 1;
    string peer_id = 2;
    PeerType peer_type = 3;
  }

  // Notification sent when a peer is removed
  message PeerDeleted {
    string room_id = 1;
    string peer_id = 2;
    PeerType peer_type = 3;
  }

  // Notification sent when a peer connects
  message PeerConnected {
    string room_id = 1;
    string peer_id = 2;
    PeerType peer_type = 3;
  }

  // Notification sent when a peer disconnects from FJ
  message PeerDisconnected {
    string room_id = 1;
    string peer_id = 2;
    PeerType peer_type = 3;
  }

  // Notification sent when a peer crashes
  message PeerCrashed {
    string room_id = 1;
    string peer_id = 2;
    string reason = 3;
    PeerType peer_type = 4;
  }

  // Notification sent when a component crashes
  message ComponentCrashed {
    string room_id = 1;
    string component_id = 2;
  }

  // Response sent by FJ, confirming successfull authentication
  message Authenticated {}

  // Request sent by peer, to authenticate to FJ server
  message AuthRequest { string token = 1; }

  // Defines message groups for which peer can subscribe
  enum EventType {
    reserved 2;
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_SERVER_NOTIFICATION = 1;
  }

  // Request sent by peer to subscribe for certain message type
  message SubscribeRequest {
    EventType event_type = 1;
  }

  // Response sent by FJ, confirming subscription for message type
  message SubscribeResponse {
    EventType event_type = 1;
  }

  // Notification sent when a room is created
  message RoomCreated {
    string room_id = 1;
  }

  // Notification sent when a room is deleted
  message RoomDeleted {
    string room_id = 1;
  }

  // Notification sent when the HLS stream becomes available in a room
  message HlsPlayable {
    string room_id = 1;
    string component_id = 2;
  }

  // Notification sent when the HLS recording is successfully uploaded to AWS S3
  message HlsUploaded {
    string room_id = 1;
  }

  // Notification sent when the upload of HLS recording to AWS S3 fails
  message HlsUploadCrashed {
    string room_id = 1;
  }

  // Notification sent when peer updates its metadata
  message PeerMetadataUpdated {
    string room_id = 1;
    string peer_id = 2;
    string metadata = 3;
    PeerType peer_type = 4;
  }

  // Notification sent when peer or component adds new track
  message TrackAdded {
    string room_id = 1;
    oneof endpoint_info {
      string peer_id = 2;
      string component_id = 3;
    }
    notifications.Track track = 4;
  }

  // Notification sent when a track is removed
  message TrackRemoved {
    string room_id = 1;
    oneof endpoint_info {
      string peer_id = 2;
      string component_id = 3;
    }
    notifications.Track track = 4;
  }

  // Notification sent when metadata of a multimedia track is updated
  message TrackMetadataUpdated {
    string room_id = 1;
    oneof endpoint_info {
      string peer_id = 2;
      string component_id = 3;
    }
    notifications.Track track = 4;
  }

  // Notification sent when a peer creates a channel
  message ChannelAdded {
    string room_id = 1;
    oneof endpoint_info {
      string peer_id = 2;
      string component_id = 3;
    }
    string channel_id = 4;
  }

  // Notification sent when a peer deletes a channel
  message ChannelRemoved {
    string room_id = 1;
    oneof endpoint_info {
      string peer_id = 2;
      string component_id = 3;
    }
    string channel_id = 4;
  }

  // Sent when there is an upsert to track forwardings from Fishjam to Composition
  message TrackForwarding {
    string room_id = 1;
    string peer_id = 2;
    string composition_url = 3;
    string input_id = 4;
    optional notifications.Track audio_track = 5; // Track has id, type, and metadata
    optional notifications.Track video_track = 6;
  }

  // Sent when track forwarding is removed
  message TrackForwardingRemoved {
    string room_id = 1;
    string peer_id = 2;
    string composition_url = 3;
    string input_id = 4;
  }

  // Notification sent when voice activity changes on a track
  message VadNotification {
    enum Status {
      STATUS_UNSPECIFIED = 0;
      STATUS_SILENCE = 1;
      STATUS_SPEECH = 2;
    }

    string room_id = 1;
    string peer_id = 2;
    string track_id = 3;
    Status status = 4;
  }

  // Notification sent when streamer successfully connects
  message StreamConnected {
    string stream_id = 1;
  }

  // Notification sent when streamer disconnects
  message StreamDisconnected {
    string stream_id = 1;
  }

  // Notification sent when viewer successfully connects
  message ViewerConnected {
    string stream_id = 1;
    string viewer_id = 2;
  }

  // Notification sent when viewer disconnects
  message ViewerDisconnected {
    string stream_id = 1;
    string viewer_id = 2;
  }

  message StreamerConnected {
    string stream_id = 1;
    string streamer_id = 2;
  }

  message StreamerDisconnected {
    string stream_id = 1;
    string streamer_id = 2;
  }

  // Carries multiple notifications in a single wire frame.
  //
  // Constraints (documented, not schema-enforced):
  //   - Each element's `content` MUST be a notification variant — never
  //     Authenticated, AuthRequest, SubscribeRequest, or SubscribeResponse.
  //   - NotificationBatch MUST NOT be nested inside another NotificationBatch.
  //     The schema technically permits this, but senders must not emit
  //     recursive batches and receivers may treat them as a protocol violation.
  //   - Notifications are delivered in array order; consumers must process
  //     them in order.
  //   - The batch is wire-atomic but not semantically atomic: emitting two
  //     batches vs. one batch of the same elements is equivalent.
  //   - Sent only to peers that opted in
  message NotificationBatch { repeated ServerMessage notifications = 1; }

  reserved 12;

  oneof content {
    // Auth

    Authenticated authenticated = 6;
    AuthRequest auth_request = 7;
    SubscribeRequest subscribe_request = 8;
    SubscribeResponse subscribe_response = 9;

    // Common

    RoomCreated room_created = 10;
    RoomDeleted room_deleted = 11;
    RoomCrashed room_crashed = 1;

    // Conferencing

    PeerConnected peer_connected = 2;
    PeerDisconnected peer_disconnected = 3;
    PeerCrashed peer_crashed = 4;
    PeerMetadataUpdated peer_metadata_updated = 16;
    TrackAdded track_added = 17;
    TrackRemoved track_removed = 18;
    TrackMetadataUpdated track_metadata_updated = 19;
    PeerAdded peer_added = 20;
    PeerDeleted peer_deleted = 21;
    ChannelAdded channel_added = 28;
    ChannelRemoved channel_removed = 29;
    TrackForwarding track_forwarding = 30;
    TrackForwardingRemoved track_forwarding_removed = 31;
    VadNotification vad_notification = 32;

    // Streaming

    ViewerConnected viewer_connected = 24;
    ViewerDisconnected viewer_disconnected = 25;
    StreamerConnected streamer_connected = 26;
    StreamerDisconnected streamer_disconnected = 27;

    // Batch
    NotificationBatch notification_batch = 33;

    // Deprecated

    StreamConnected stream_connected = 22 [deprecated = true];
    StreamDisconnected stream_disconnected = 23 [deprecated = true];
    HlsPlayable hls_playable = 13 [deprecated = true];
    HlsUploaded hls_uploaded = 14 [deprecated = true];
    HlsUploadCrashed hls_upload_crashed = 15 [deprecated = true];
    ComponentCrashed component_crashed = 5 [deprecated = true];
  }
}
